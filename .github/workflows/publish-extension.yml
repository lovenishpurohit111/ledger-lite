name: Publish Firefox Extension

on:
  push:
    branches: [main]
    paths: ["extension/**"]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Read version from manifest.json (no auto-bump — manage versions manually)
      - name: Read version
        id: ver
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('extension/manifest.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Install Node + web-ext
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web-ext
        run: npm install -g web-ext

      # Run extension self-tests
      - name: Run tests
        run: |
          cd /tmp && npm install jsdom 2>/dev/null
          node $GITHUB_WORKSPACE/extension/test.cjs

      # Build ZIP (from inside extension/ so manifest.json is at root)
      - name: Build ZIP
        run: |
          cd extension
          zip -r ../FinXport-v${{ steps.ver.outputs.version }}.zip . \
            --exclude "test.cjs" --exclude "*.map"

      # Create GitHub Release with ZIP attached
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: FinXport v${{ steps.ver.outputs.version }}
          body: |
            ### FinXport v${{ steps.ver.outputs.version }}

            **Install on Firefox:** Upload ZIP at addons.mozilla.org → Manage Submissions
            **Install on Chrome:** Unzip → `chrome://extensions` → Developer mode → Load unpacked
          files: FinXport-v${{ steps.ver.outputs.version }}.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      # Submit to Firefox Add-ons (requires FIREFOX_API_KEY + FIREFOX_API_SECRET secrets)
      - name: Submit to Firefox Add-ons
        env:
          FIREFOX_API_KEY: ${{ secrets.FIREFOX_API_KEY }}
          FIREFOX_API_SECRET: ${{ secrets.FIREFOX_API_SECRET }}
        run: |
          web-ext sign \
            --source-dir ./extension \
            --api-key "$FIREFOX_API_KEY" \
            --api-secret "$FIREFOX_API_SECRET" \
            --channel listed \
            --timeout 300000
